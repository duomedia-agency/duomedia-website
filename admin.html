<!doctype html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Duo Media CMS</title>
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
    <style>
        /* ADMIN OVERRIDES */
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; background: #0f1115; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* LOGIN GATE */
        .admin-gate { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .admin-gate h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .admin-gate p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
        .admin-pw-input { width: 100%; max-width: 300px; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: #fff; font-size: 0.95rem; outline: none; margin-bottom: 1rem; }
        .admin-pw-btn { width: 100%; max-width: 300px; padding: 0.8rem; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .admin-pw-btn:hover { background: var(--primary-dark); }
        .admin-error { color: #ff4a4a; margin-top: 1rem; display: none; font-size: 0.9rem; }

        /* SPLIT SCREEN */
        .cms-layout { display: none; width: 100%; height: 100vh; }
        .cms-layout.visible { display: flex; }
        
        /* SIDEBAR */
        .cms-sidebar { width: 450px; min-width: 400px; max-width: 50vw; background: #1a1d24; border-right: 1px solid #2d313a; display: flex; flex-direction: column; height: 100%; }
        .cms-header { padding: 1.25rem; border-bottom: 1px solid #2d313a; display: flex; justify-content: space-between; align-items: center; }
        .cms-header h2 { font-size: 1.1rem; margin: 0; display: flex; align-items: center; gap: 0.5rem; }
        .cms-header h2 img { height: 24px; }
        
        .cms-actions { display: flex; gap: 0.5rem; }
        .btn-logout { background: transparent; border: 1px solid #2d313a; color: #aaa; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-logout:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-publish { background: var(--primary); border: none; color: #fff; padding: 0.4rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .btn-publish:hover { background: var(--primary-dark); }
        .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ACCORDION */
        .cms-content { flex: 1; overflow-y: auto; padding: 1rem; }
        .accordion-item { border: 1px solid #2d313a; border-radius: 8px; margin-bottom: 0.75rem; background: #14161a; overflow: hidden; }
        .accordion-header { padding: 1rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; font-size: 0.95rem; user-select: none; transition: background 0.2s; }
        .accordion-header:hover { background: rgba(255,255,255,0.02); }
        .accordion-header i { transition: transform 0.3s; color: #888; }
        .accordion-item.active .accordion-header i { transform: rotate(180deg); }
        .accordion-body { display: none; padding: 1rem; border-top: 1px solid #2d313a; background: #0f1115; }
        .accordion-item.active .accordion-body { display: block; }

        /* FORMS */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.4rem; font-weight: 500; }
        .form-input, .form-textarea { width: 100%; padding: 0.6rem 0.8rem; background: #1a1d24; border: 1px solid #2d313a; border-radius: 6px; color: #fff; font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
        .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
        .form-textarea { min-height: 80px; resize: vertical; }
        
        /* LIST ITEMS (Brands, Portfolio, etc) */
        .list-items { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        .list-item { display: flex; align-items: center; gap: 0.75rem; background: #1a1d24; border: 1px solid #2d313a; padding: 0.5rem; border-radius: 6px; }
        .list-item-img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #000; }
        .list-item-info { flex: 1; min-width: 0; }
        .list-item-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-sub { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-actions { display: flex; gap: 0.25rem; }
        .btn-icon { background: transparent; border: none; color: #888; cursor: pointer; padding: 0.2rem; border-radius: 4px; transition: 0.2s; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-icon.danger:hover { color: #ff4a4a; }

        /* ADD NEW ITEM FORM */
        .add-form { background: #1a1d24; border: 1px dotted #444; padding: 1rem; border-radius: 6px; margin-top: 1rem; }
        .add-form h4 { font-size: 0.85rem; margin-top: 0; margin-bottom: 1rem; color: #ccc; }
        .file-upload { display: block; border: 1px dashed #444; text-align: center; padding: 1.5rem 1rem; border-radius: 6px; cursor: pointer; margin-bottom: 1rem; transition: 0.2s; color: #aaa; font-size: 0.85rem; }
        .file-upload:hover { border-color: var(--primary); color: #fff; }
        .file-upload input { display: none; }
        .btn-add { width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid #2d313a; color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .btn-add:hover { background: var(--primary); border-color: var(--primary); }

        /* PREVIEW */
        .cms-preview { flex: 1; background: #fff; position: relative; }
        .cms-preview iframe { width: 100%; height: 100%; border: none; }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .progress-bar-container { width: 100%; height: 4px; background: #2d313a; border-radius: 2px; overflow: hidden; margin-bottom: 1rem; display: none; }
        .progress-bar-container.active { display: block; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <!-- ========== LOGIN GATE ========== -->
    <div class="admin-gate" id="admin-gate">
        <img src="./assets/logo/DUO_Simbolo_Bianco.png" alt="Duo Media" style="width:80px; margin-bottom:0.5rem;" class="invert-on-light" />
        <h1>CMS Login</h1>
        <p>Inserisci il tuo GitHub Personal Access Token.</p>
        <input type="password" class="admin-pw-input" id="auth-password" placeholder="GitHub PAT" />
        <button class="admin-pw-btn" id="auth-btn">Accedi</button>
        <div class="admin-error" id="auth-error"></div>
    </div>

    <!-- ========== CMS LAYOUT ========== -->
    <div class="cms-layout" id="cms-layout">
        
        <!-- SIDEBAR -->
        <div class="cms-sidebar">
            <div class="cms-header">
                <h2><img src="./assets/logo/DUO_Simbolo_Bianco.png" alt=""> Admin</h2>
                <div class="cms-actions">
                    <button class="btn-logout" id="logout-btn">Esci</button>
                    <button class="btn-publish" id="publish-btn">Pubblica</button>
                </div>
            </div>
            
            <div class="cms-content" id="accordion-container">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="cms-preview">
            <iframe src="index.html" id="preview-frame"></iframe>
        </div>
    </div>

    <!-- ========== SCRIPTS ========== -->
<script>
// ============ CONFIGURATION ============
const REPO_OWNER = 'duomedia-agency';
const REPO_NAME = 'duomedia-website';
const BRANCH = 'main';

let githubToken = localStorage.getItem('github_token') || '';
let siteData = {};
let dataFileSha = '';

// ============ DOM ELEMENTS ============
const gate = document.getElementById('admin-gate');
const layout = document.getElementById('cms-layout');
const pwInput = document.getElementById('auth-password');
const authBtn = document.getElementById('auth-btn');
const authError = document.getElementById('auth-error');
const logoutBtn = document.getElementById('logout-btn');
const publishBtn = document.getElementById('publish-btn');
const accordionContainer = document.getElementById('accordion-container');
const previewFrame = document.getElementById('preview-frame');

// ============ AUTH ============
authBtn.addEventListener('click', doLogin);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
    const token = pwInput.value.trim();
    if (!token) return;
    
    authBtn.textContent = 'Verifica...';
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
            headers: { 'Authorization': `token ${token}` }
        });
        
        if (!res.ok) throw new Error('Token non valido o permessi insufficienti');
        
        githubToken = token;
        localStorage.setItem('github_token', token);
        await initCMS();
    } catch (err) {
        authError.textContent = err.message;
        authError.style.display = 'block';
        setTimeout(() => { authError.style.display = 'none'; }, 3000);
    }
    authBtn.textContent = 'Accedi';
}

logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('github_token');
    githubToken = '';
    gate.style.display = 'flex';
    layout.classList.remove('visible');
    pwInput.value = '';
});

// Auto-login
if (githubToken) {
    initCMS();
}

async function initCMS() {
    gate.style.display = 'none';
    layout.classList.add('visible');
    await loadDataFromGitHub();
    renderSidebar();
}

// ============ GITHUB API HELPERS ============
async function fetchWithToken(url, options = {}) {
    options.headers = {
        'Authorization': `token ${githubToken}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
        ...(options.headers || {})
    };
    const res = await fetch(url, options);
    if (!res.ok) {
        if (res.status === 401) {
            alert("Token scaduto o non valido.");
            logoutBtn.click();
        }
        throw new Error(`GitHub API Error: ${res.statusText}`);
    }
    return res.json();
}

function b64EncodeUnicode(str) {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
        function toSolidBytes(match, p1) { return String.fromCharCode('0x' + p1); }));
}

async function loadDataFromGitHub() {
    try {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json?ref=${BRANCH}`;
        const response = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
        
        if (response.status === 404) {
            siteData = {};
            dataFileSha = '';
            return;
        }
        if (!response.ok) throw new Error('Impossibile caricare data.json');
        
        const fileData = await response.json();
        dataFileSha = fileData.sha;
        
        const jsonString = decodeURIComponent(atob(fileData.content).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        
        siteData = JSON.parse(jsonString);
    } catch (err) {
        alert("Errore nel caricamento dei dati: " + err.message);
    }
}

publishBtn.addEventListener('click', async () => {
    publishBtn.disabled = true;
    publishBtn.textContent = 'Salvataggio...';
    try {
        const jsonString = JSON.stringify(siteData, null, 2);
        const body = {
            message: 'CMS Update',
            content: b64EncodeUnicode(jsonString),
            branch: BRANCH
        };
        if (dataFileSha) body.sha = dataFileSha;
        
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data.json`;
        const res = await fetchWithToken(url, { method: 'PUT', body: JSON.stringify(body) });
        dataFileSha = res.content.sha;
        
        publishBtn.textContent = 'Pubblicato!';
        setTimeout(() => { publishBtn.textContent = 'Pubblica'; publishBtn.disabled = false; }, 2000);
    } catch (err) {
        alert('Errore salvataggio: ' + err.message);
        publishBtn.textContent = 'Riprova';
        publishBtn.disabled = false;
    }
});

// ============ FILE UPLOAD ============
function getBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
    });
}

async function uploadFileToGitHub(file, folder, progressBar) {
    const fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '');
    const path = `assets/uploads/${folder}/${fileName}`;
    if (progressBar) progressBar.parentElement.classList.add('active');
    
    try {
        const base64Content = await getBase64(file);
        if (progressBar) progressBar.style.width = '50%';
        
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        await fetchWithToken(url, {
            method: 'PUT',
            body: JSON.stringify({ message: `Upload ${fileName}`, content: base64Content, branch: BRANCH })
        });
        
        if (progressBar) {
            progressBar.style.width = '100%';
            setTimeout(() => { progressBar.parentElement.classList.remove('active'); progressBar.style.width = '0%'; }, 600);
        }
        return `./${path}`;
    } catch (err) {
        if (progressBar) progressBar.parentElement.classList.remove('active');
        throw err;
    }
}

// ============ REAL-TIME UPDATE ============
function triggerPreviewUpdate() {
    if (previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'UPDATE_CONTENT', data: siteData }, '*');
    }
}

// Update text in JSON
function updateText(path, value) {
    const parts = path.split('.');
    let obj = siteData;
    for (let i = 0; i < parts.length - 1; i++) {
        if (!obj[parts[i]]) obj[parts[i]] = {};
        obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = value;
    triggerPreviewUpdate();
}

// Generate unique ID
function generateId() { return Math.random().toString(36).substr(2, 9); }

// Move item in array
window.moveItem = function(collection, id, direction) {
    const arr = siteData[collection]?.items || [];
    const index = arr.findIndex(x => x.id === id);
    if (index < 0) return;
    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= arr.length) return;
    
    const temp = arr[index];
    arr[index] = arr[newIndex];
    arr[newIndex] = temp;
    arr.forEach((item, i) => item.order = i);
    
    triggerPreviewUpdate();
    renderSidebar(); // Re-render to show updated order
}

window.removeItem = function(collection, id) {
    if (!confirm('Eliminare questo elemento?')) return;
    siteData[collection].items = siteData[collection].items.filter(x => x.id !== id);
    triggerPreviewUpdate();
    renderSidebar();
}

// ============ UI RENDERING ============

function createInput(label, path, isTextarea = false) {
    // Get value safely
    const val = path.split('.').reduce((o, i) => o ? o[i] : '', siteData) || '';
    const tag = isTextarea ? 'textarea' : 'input';
    const className = isTextarea ? 'form-textarea' : 'form-input';
    return `
        <div class="form-group">
            <label>${label}</label>
            <${tag} class="${className}" oninput="updateText('${path}', this.value)">${isTextarea ? val : ''}</${tag}>
        </div>
    `.replace('></input>', ` value="${val.replace(/"/g, '&quot;')}" />`);
}

function renderAccordionItem(title, icon, contentHtml, id) {
    return `
        <div class="accordion-item" id="acc-${id}">
            <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">
                <span><i class="bi ${icon}"></i> ${title}</span>
                <i class="bi bi-chevron-down"></i>
            </div>
            <div class="accordion-body">
                ${contentHtml}
            </div>
        </div>
    `;
}

function renderSidebar() {
    let html = '';
    
    // 1. HERO
    let heroHtml = createInput('Titolo (Riga 1)', 'hero.titleLine1');
    heroHtml += createInput('Titolo (Riga 2)', 'hero.titleLine2');
    heroHtml += createInput('Sottotitolo', 'hero.subtitle', true);
    html += renderAccordionItem('Hero Section', 'bi-stars', heroHtml, 'hero');
    
    // 2. BRANDS
    let brandsHtml = createInput('Titolo Sezione', 'brands.title');
    brandsHtml += '<div class="list-items">';
    const brandsArr = (siteData.brands?.items || []).sort((a,b)=>(a.order??99)- (b.order??99));
    brandsArr.forEach((b, i) => {
        brandsHtml += `
            <div class="list-item">
                <img src="${b.logo}" class="list-item-img" style="background:#f1f1f1;" />
                <div class="list-item-info">
                    <div class="list-item-title">${b.name}</div>
                </div>
                <div class="list-item-actions">
                    <button class="btn-icon" onclick="moveItem('brands','${b.id}',-1)" ${i===0?'disabled':''}><i class="bi bi-arrow-up"></i></button>
                    <button class="btn-icon" onclick="moveItem('brands','${b.id}',1)" ${i===brandsArr.length-1?'disabled':''}><i class="bi bi-arrow-down"></i></button>
                    <button class="btn-icon danger" onclick="removeItem('brands','${b.id}')"><i class="bi bi-trash"></i></button>
                </div>
            </div>`;
    });
    brandsHtml += `</div>
        <div class="add-form">
            <h4>Aggiungi Brand</h4>
            <div class="progress-bar-container"><div class="progress-bar"></div></div>
            <input type="text" id="add-br-name" class="form-input" placeholder="Nome Brand" style="margin-bottom:0.5rem;" />
            <input type="text" id="add-br-link" class="form-input" placeholder="Link (opzionale)" style="margin-bottom:0.5rem;" />
            <label class="file-upload"><input type="file" id="add-br-file" accept="image/*" onchange="this.parentElement.querySelector('span').textContent=this.files[0].name" /> <span>Carica Logo</span></label>
            <button class="btn-add" onclick="addBrand(this)"><i class="bi bi-plus"></i> Aggiungi</button>
        </div>`;
    html += renderAccordionItem('Brand', 'bi-bag', brandsHtml, 'brands');
    
    // 3. PORTFOLIO
    let pfHtml = createInput('Titolo Sezione', 'portfolio.title');
    pfHtml += createInput('Sottotitolo', 'portfolio.subtitle');
    pfHtml += '<div class="list-items">';
    const pfArr = (siteData.portfolio?.items || []).sort((a,b)=>(a.order??99)- (b.order??99));
    pfArr.forEach((p, i) => {
        pfHtml += `
            <div class="list-item">
                <img src="${p.image}" class="list-item-img" />
                <div class="list-item-info">
                    <div class="list-item-title">${p.title}</div>
                    <div class="list-item-sub">${p.description}</div>
                </div>
                <div class="list-item-actions">
                    <button class="btn-icon" onclick="moveItem('portfolio','${p.id}',-1)" ${i===0?'disabled':''}><i class="bi bi-arrow-up"></i></button>
                    <button class="btn-icon" onclick="moveItem('portfolio','${p.id}',1)" ${i===pfArr.length-1?'disabled':''}><i class="bi bi-arrow-down"></i></button>
                    <button class="btn-icon danger" onclick="removeItem('portfolio','${p.id}')"><i class="bi bi-trash"></i></button>
                </div>
            </div>`;
    });
    pfHtml += `</div>
        <div class="add-form">
            <h4>Aggiungi Progetto</h4>
            <div class="progress-bar-container"><div class="progress-bar"></div></div>
            <input type="text" id="add-pf-title" class="form-input" placeholder="Titolo" style="margin-bottom:0.5rem;" />
            <input type="text" id="add-pf-desc" class="form-input" placeholder="Descrizione" style="margin-bottom:0.5rem;" />
            <label class="file-upload"><input type="file" id="add-pf-file" accept="image/*" onchange="this.parentElement.querySelector('span').textContent=this.files[0].name" /> <span>Carica Immagine</span></label>
            <button class="btn-add" onclick="addPortfolio(this)"><i class="bi bi-plus"></i> Aggiungi</button>
        </div>`;
    html += renderAccordionItem('Portfolio', 'bi-images', pfHtml, 'portfolio');

    // 4. TESTIMONIALS
    let tsHtml = createInput('Titolo Sezione', 'testimonials.title');
    tsHtml += '<div class="list-items">';
    const tsArr = (siteData.testimonials?.items || []).sort((a,b)=>(a.order??99)- (b.order??99));
    tsArr.forEach((t, i) => {
        tsHtml += `
            <div class="list-item">
                <img src="${t.photo || './assets/images/people/man.jpg'}" class="list-item-img" style="border-radius:50%;" />
                <div class="list-item-info">
                    <div class="list-item-title">${t.name}</div>
                    <div class="list-item-sub">${t.text}</div>
                </div>
                <div class="list-item-actions">
                    <button class="btn-icon" onclick="moveItem('testimonials','${t.id}',-1)" ${i===0?'disabled':''}><i class="bi bi-arrow-up"></i></button>
                    <button class="btn-icon" onclick="moveItem('testimonials','${t.id}',1)" ${i===tsArr.length-1?'disabled':''}><i class="bi bi-arrow-down"></i></button>
                    <button class="btn-icon danger" onclick="removeItem('testimonials','${t.id}')"><i class="bi bi-trash"></i></button>
                </div>
            </div>`;
    });
    tsHtml += `</div>
        <div class="add-form">
            <h4>Aggiungi Recensione</h4>
            <div class="progress-bar-container"><div class="progress-bar"></div></div>
            <input type="text" id="add-ts-name" class="form-input" placeholder="Nome" style="margin-bottom:0.5rem;" />
            <input type="text" id="add-ts-role" class="form-input" placeholder="Ruolo/Azienda" style="margin-bottom:0.5rem;" />
            <textarea id="add-ts-text" class="form-textarea" placeholder="Testo recensione..." style="margin-bottom:0.5rem;"></textarea>
            <label class="file-upload"><input type="file" id="add-ts-file" accept="image/*" onchange="this.parentElement.querySelector('span').textContent=this.files[0].name" /> <span>Carica Foto (Opzionale)</span></label>
            <button class="btn-add" onclick="addTestimonial(this)"><i class="bi bi-plus"></i> Aggiungi</button>
        </div>`;
    html += renderAccordionItem('Recensioni', 'bi-chat-quote', tsHtml, 'testimonials');

    // 5. CONTACT / FOOTER
    let contactHtml = createInput('Titolo Contatti', 'contact.title');
    contactHtml += createInput('Sottotitolo Contatti', 'contact.subtitle');
    contactHtml += createInput('Email di ricezione', 'contact.email');
    contactHtml += createInput('Link Instagram', 'contact.igLink');
    contactHtml += createInput('Nome Utente IG', 'contact.igHandle');
    contactHtml += '<hr style="border-color:#2d313a; margin: 1rem 0;" />';
    contactHtml += createInput('Nome Azienda Footer', 'footer.companyName');
    contactHtml += createInput('Partita IVA', 'footer.piva');
    contactHtml += createInput('Città/Sede', 'footer.location');
    html += renderAccordionItem('Contatti & Footer', 'bi-envelope', contactHtml, 'contact');

    accordionContainer.innerHTML = html;
}

// ============ ADD ITEM FUNCTIONS ============
window.addBrand = async function(btn) {
    const parent = btn.parentElement;
    const name = parent.querySelector('#add-br-name').value;
    const link = parent.querySelector('#add-br-link').value;
    const file = parent.querySelector('#add-br-file').files[0];
    
    if (!name || !file) return alert('Inserisci nome e logo');
    
    btn.disabled = true; btn.textContent = 'Caricamento...';
    try {
        const logo = await uploadFileToGitHub(file, 'brands', parent.querySelector('.progress-bar'));
        if (!siteData.brands) siteData.brands = { items: [] };
        if (!siteData.brands.items) siteData.brands.items = [];
        siteData.brands.items.push({ id: generateId(), name, link, logo, order: siteData.brands.items.length });
        
        triggerPreviewUpdate();
        renderSidebar();
    } catch(e) { alert(e.message); btn.disabled = false; btn.textContent = 'Riprova'; }
}
